name: Hourly AQI fetch, forecast, and dashboard build

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: aqi-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest AQI reading
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python scripts/fetch_data.py

      - name: Fetch latest weather
        run: python scripts/fetch_weather.py

      - name: Build forecast
        run: python scripts/forecast.py

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aqi_history.csv data/forecast.json data/waqi_forecast_raw.json data/weather_history.csv data/weather_forecast.json docs/index.html
          git diff --cached --quiet || git commit -m "Hourly update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
